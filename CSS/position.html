<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height:2000vh;
        }
        .navbar{
            position: sticky;
            top:0;
        }
        .Relative{
            border: 2px solid red;
            position: relative;
            margin-top:20vh;
            height: 50vh;
        }
        .absolute{
            position: absolute;
            border: 2px solid blue;
            margin: 10px;
            margin-left:50px;
        }
        .Fixed{
            position: fixed;
            
        }
    </style>
</head>


<body>
    <div class="Navbar">
        <nav>
            <ul>
                <li>home</li>
                <li>about</li>
                <li>contact</li>
                <li>services</li>
            </ul>
        </nav>
    </div>
    <div class="Relative">
        <h1>Relative</h1>
        <div class="absolute">
            <h1>Absolute</h1>
        </div>
    </div>
    <div class="Fixed">Fixed</div>
</body>

</html>
